<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GDT ENLACE | Registro de Disponibilidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --indigo: #4f46e5;
            --indigo-dark: #4338ca;
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-600: #475569;
            --slate-900: #0f172a;
            --emerald: #10b981;
            --font-main: 'Inter', sans-serif;
        }

        /* RESET TOTAL PARA ELIMINAR EL SCROLL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body {
            height: 100dvh; 
            width: 100vw;
            overflow: hidden; 
            font-family: var(--font-main);
            background-color: var(--slate-50);
            color: var(--slate-900);
        }

        /* CONTENEDOR DE VISTAS */
        .view-step {
            display: none;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            padding: 12px;
            animation: fadeIn 0.3s ease forwards;
        }

        .view-step.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TARJETAS (PASO 1 Y ÉXITO) --- */
        .card {
            background: white;
            padding: 2.5rem 1.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        #step-1, #step-success { justify-content: center; align-items: center; }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--slate-900); }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
        
        .input-group input, .input-group select { 
            width: 100%; padding: 0.8rem; border: 1px solid var(--slate-200); 
            border-radius: 0.6rem; font-size: 1rem; outline: none; transition: border 0.2s;
            background-color: white;
            font-family: inherit;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--indigo); }
        .input-group input:invalid:not(:placeholder-shown) { border-color: #ef4444; }

        /* --- PASO 2: CALENDARIO --- */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 35px;
            flex-shrink: 0;
        }
        .btn-text { background: none; border: none; color: var(--indigo); font-weight: 600; cursor: pointer; font-size: 0.9rem; }

        .grid-wrapper {
            flex: 1; 
            display: flex;
            flex-direction: column;
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .calendar-grid {
            display: grid;
            height: 100%;
            width: 100%;
            grid-template-columns: 2.8rem repeat(7, 1fr);
            grid-template-rows: 25px repeat(14, 1fr);
        }

        .cell {
            border-right: 1px solid var(--slate-200);
            border-bottom: 1px solid var(--slate-200);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .head { background: var(--slate-50); font-weight: 700; font-size: 0.6rem; text-transform: uppercase; }
        .time { background: var(--slate-50); color: var(--slate-600); font-weight: 500; font-size: 0.6rem; }

        .slot-checkbox { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .slot-box {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            transition: 0.1s; color: transparent; font-weight: bold;
        }
        .slot-checkbox:checked + .slot-box { background-color: var(--indigo); color: white; }

        /* --- BOTONES --- */
        .btn-main {
            width: 100%; height: 50px; background: var(--indigo); color: white;
            border: none; border-radius: 0.75rem; font-weight: 700; font-size: 1rem;
            cursor: pointer; margin-top: 12px; flex-shrink: 0; transition: background 0.2s;
        }
        .btn-main:active { background: var(--indigo-dark); transform: scale(0.98); }
        .btn-main:disabled { background: var(--slate-200); color: var(--slate-600); cursor: not-allowed; }

        /* --- VISTA DE ÉXITO --- */
        .success-icon {
            width: 64px; height: 64px; background: var(--emerald); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 1.5rem;
        }
        .success-msg { color: var(--slate-600); line-height: 1.5; margin-bottom: 2rem; }

        @media (min-width: 768px) {
            .calendar-grid { grid-template-columns: 4.5rem repeat(7, 1fr); }
            .head, .cell { font-size: 0.8rem; }
            .view-step { padding: 2rem; }
        }
    </style>
</head>
<body>

    <section id="step-1" class="view-step active">
        <form id="formDatos" class="card" onsubmit="event.preventDefault(); goToStep2();">
            <h1>Registro de Datos</h1>
                    <p class="subtitle">Ingresa tu información para comenzar.</p>
<br>
<br>
            <div class="input-group">
                <label>Nombre y apellido</label>
                <input type="text" id="nombre" placeholder="Ej. Dr. Juan Soto" required>
            </div>
            <div class="input-group">
                <label>Hospital o Clínica</label>
                <select id="hospital" required>
                    <option value="" disabled selected><span style="color: gray;">Selecciona una institución...</span></option>
                    <option value="Clínica Alemana">Clínica Alemana</option>
                    <option value="Clínica U. Andes">Clínica U. Andes</option>
                    <option value="H. San José - IPS Horwitz">H. San José - IPS Horwitz</option>
                    <option value="Hospital Barros Luco">Hospital Barros Luco</option>
                    <option value="Hospital Biprovincial Quillota Petorca">Hospital Biprovincial Quillota Petorca</option>
                    <option value="Hospital Clínico UC">Hospital Clínico UC</option>
                    <option value="Hospital de Angol">Hospital de Angol</option>
                    <option value="Hospital de Carabineros">Hospital de Carabineros</option>
                    <option value="Hospital de Coquimbo">Hospital de Coquimbo</option>
                    <option value="Hospital de Ovalle">Hospital de Ovalle</option>
                    <option value="Hospital de Talca">Hospital de Talca</option>
                    <option value="Hospital de Temuco">Hospital de Temuco</option>
                    <option value="Hospital del Tórax">Hospital del Tórax</option>
                    <option value="Hospital del Trabajador">Hospital del Trabajador</option>
                    <option value="Hospital El Pino">Hospital El Pino</option>
                    <option value="Hospital Félix Bulnes">Hospital Félix Bulnes</option>
                    <option value="Hospital Gustavo Fricke">Hospital Gustavo Fricke</option>
                    <option value="Hospital La Florida">Hospital La Florida</option>
                    <option value="Hospital Las Higueras de Talcahuano">Hospital Las Higueras de Talcahuano</option>
                    <option value="Hospital Padre Hurtado">Hospital Padre Hurtado</option>
                    <option value="Hospital Puerto Montt">Hospital Puerto Montt</option>
                    <option value="Hospital Regional Concepción">Hospital Regional Concepción</option>
                    <option value="Hospital Regional de Coyhaique">Hospital Regional de Coyhaique</option>
                    <option value="Hospital San Borja">Hospital San Borja</option>
                    <option value="Hospital San Juan de Dios">Hospital San Juan de Dios</option>
                    <option value="Hospital Sótero del Río">Hospital Sótero del Río</option>
                    <option value="Hospital Van Buren Valparaíso">Hospital Van Buren Valparaíso</option>
                    <option value="INCANCER">INCANCER</option>
                    <option value="Posta Central">Posta Central</option>
                    <option value="Otro Hospital/Clínica">Otro Hospital/Clínica</option>
                </select>
            </div>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input 
                    type="email" 
                    id="correo" 
                    placeholder="correo@ejemplo.com" 
                    required 
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                    title="Ingresa un correo válido (ejemplo@dominio.com)"
                >
            </div>
            <button type="submit" class="btn-main">Continuar a Disponibilidad →</button>
        </form>
    </section>

    <section id="step-2" class="view-step">
        <div class="calendar-nav">
            <button class="btn-text" onclick="goToStep1()">← Volver</button>
                    <div style="text-align: right">
                        <p style="font-weight: 700; font-size: 0.9rem;">Selecciona tus horarios</p>
                        <p style="font-size: 0.75rem; color: var(--slate-600);">Lunes a Domingo, 08:00 - 21:00</p>
                    </div>
        </div>

        <div class="grid-wrapper">
            <div class="calendar-grid" id="grid"></div>
        </div>

        <button id="btnFinalizar" class="btn-main" onclick="enviarTodo()">Finalizar y Enviar</button>
    </section>

    <section id="step-success" class="view-step">
        <div class="card">
            <div class="success-icon">✓</div>
            <h1>¡Enviado con éxito!</h1>
            <p class="success-msg">La información de tu disponibilidad ha sido recibida correctamente. Ya puedes cerrar esta ventana.</p>
            <button class="btn-main" onclick="location.reload()">Enviar otra respuesta</button>
        </div>
    </section>

    <script>
        const CONFIG = {
            url: "https://script.google.com/macros/s/AKfycbz8Jwt2XMZP5qS73P9QEbtaUtkueBPMwdVfNca5Z2BIvTK0jky5cyE0Yg0FGmblwEdarw/exec",
            dias: ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"],
            horas: ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00"]
        };

        function goToStep2() {
            const form = document.getElementById('formDatos');
            if(!form.checkValidity()) {
                alert("Por favor, completa todos los campos correctamente."); 
                return;
            }
            showStep(2);
        }

        function goToStep1() { showStep(1); }

        function showStep(stepNumber) {
            document.querySelectorAll('.view-step').forEach(s => s.classList.remove('active'));
            if(stepNumber === 1) document.getElementById('step-1').classList.add('active');
            if(stepNumber === 2) document.getElementById('step-2').classList.add('active');
            if(stepNumber === 3) document.getElementById('step-success').classList.add('active');
        }

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            const corner = document.createElement('div');
            corner.className = 'cell head';
            grid.appendChild(corner);

            CONFIG.dias.forEach(d => {
                const div = document.createElement('div');
                div.className = 'cell head';
                div.innerText = d;
                grid.appendChild(div);
            });

            CONFIG.horas.forEach((h, hIdx) => {
                const labelH = document.createElement('div');
                labelH.className = 'cell time';
                labelH.innerText = h;
                grid.appendChild(labelH);

                CONFIG.dias.forEach((d, dIdx) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const id = `cb-${dIdx}-${hIdx}`;
                    // Aquí es donde hicimos el cambio para mostrar el Día y la Hora en vez del "✓"
                    cell.innerHTML = `
                        <input type="checkbox" class="slot-checkbox" id="${id}" value="${d} ${h}">
                        <div class="slot-box" style="font-size: 0.55rem; flex-direction: column; line-height: 1.2;">
                            <span>${d}</span>
                            <span>${h}</span>
                        </div>
                    `;
                    grid.appendChild(cell);
                });
            });
        }

        function enviarTodo() {
            const seleccionados = Array.from(document.querySelectorAll('.slot-checkbox:checked')).map(cb => cb.value);
            if(seleccionados.length === 0) return alert("Selecciona al menos un horario.");

            const btn = document.getElementById('btnFinalizar');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const payload = {
                nombre: document.getElementById('nombre').value,
                hospital: document.getElementById('hospital').value,
                correo: document.getElementById('correo').value,
                seleccionados: seleccionados
            };

            // Ajuste clave: Usamos text/plain en el Content-Type para evitar bloqueos en Google Apps Script
            fetch(CONFIG.url, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                // Al usar no-cors, la respuesta siempre será "opaca", así que asumimos éxito si no hay error de red
                showStep(3);
            })
            .catch((error) => {
                console.error("Error:", error);
                alert("Ocurrió un error al enviar los datos.");
                btn.disabled = false;
                btn.innerText = "Finalizar y Enviar";
            });
        }

        initGrid();
    </script>
</body>
</html>
